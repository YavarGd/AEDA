name: Factory Windows Validation

run-name: >-
  Factory Windows validation • ${{ inputs.request_id }} • ${{ inputs.target_ref }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Factory mission/request identifier
        required: true
        type: string
      target_ref:
        description: Branch, tag, or commit SHA to validate
        required: true
        default: main
        type: string
      test_filter:
        description: Optional dotnet test filter
        required: false
        default: ""
        type: string
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: read

concurrency:
  group: factory-windows-${{ inputs.request_id }}
  cancel-in-progress: false

jobs:
  validate:
    name: Windows build and test
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      FACTORY_REQUEST_ID: ${{ inputs.request_id }}
      FACTORY_TARGET_REF: ${{ inputs.target_ref }}
      FACTORY_TEST_FILTER: ${{ inputs.test_filter }}
      FACTORY_CONFIGURATION: ${{ inputs.configuration }}
      TEST_PROJECT: PersonalAI.Tests/PersonalAI.Tests.csproj
      DOTNET_TEST_TIMEOUT_SECONDS: 3300

    steps:
      - name: Check out requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Capture environment
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          dotnet --info | Tee-Object -FilePath TestResults/dotnet-info.txt
          git rev-parse HEAD | Tee-Object -FilePath TestResults/validated-commit.txt

      - name: Restore
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet restore $env:TEST_PROJECT --nologo 2>&1 |
            Tee-Object -FilePath TestResults/restore.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $arguments = @(
            "test",
            $env:TEST_PROJECT,
            "--configuration", $env:FACTORY_CONFIGURATION,
            "--no-restore",
            "--nologo",
            "--logger", "trx;LogFileName=factory-windows-validation.trx",
            "--results-directory", "TestResults",
            "--verbosity", "normal"
          )

          if (-not [string]::IsNullOrWhiteSpace($env:FACTORY_TEST_FILTER)) {
            $arguments += @("--filter", $env:FACTORY_TEST_FILTER)
          }

          $effectiveCommand = "dotnet " + ($arguments -join " ")
          "Effective test filter: '$env:FACTORY_TEST_FILTER'" |
            Tee-Object -FilePath TestResults/effective-test-filter.txt
          "Effective dotnet command: $effectiveCommand" |
            Tee-Object -FilePath TestResults/effective-dotnet-command.txt
          "dotnet test timeout seconds: $env:DOTNET_TEST_TIMEOUT_SECONDS" |
            Tee-Object -FilePath TestResults/test-timeout.txt

          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo.FileName = "dotnet"
          foreach ($argument in $arguments) {
            [void]$process.StartInfo.ArgumentList.Add($argument)
          }

          $process.StartInfo.RedirectStandardOutput = $true
          $process.StartInfo.RedirectStandardError = $true
          $process.StartInfo.UseShellExecute = $false
          $process.StartInfo.CreateNoWindow = $true

          [void]$process.Start()

          $stdoutTask = $process.StandardOutput.ReadToEndAsync()
          $stderrTask = $process.StandardError.ReadToEndAsync()

          $completed = $process.WaitForExit([int]$env:DOTNET_TEST_TIMEOUT_SECONDS * 1000)
          $timedOut = -not $completed
          if ($completed) {
            [void]$process.WaitForExit()
          } else {
            "dotnet test exceeded $env:DOTNET_TEST_TIMEOUT_SECONDS seconds; collecting diagnostics." |
              Tee-Object -FilePath TestResults/test-hang-diagnostics.log

            Get-Process dotnet -ErrorAction SilentlyContinue |
              Select-Object Id, ProcessName, CPU, StartTime, Path |
              Format-List |
              Out-File -FilePath TestResults/dotnet-processes.txt

            Get-Process testhost -ErrorAction SilentlyContinue |
              Select-Object Id, ProcessName, CPU, StartTime, Path |
              Format-List |
              Out-File -FilePath TestResults/testhost-processes.txt

            try {
              $process.Kill($true)
            } catch {
              "Failed to kill timed-out dotnet process: $_" |
                Add-Content -Path TestResults/test-hang-diagnostics.log
            }

            [void]$process.WaitForExit()
          }

          $outputCollectionTimeout = [TimeSpan]::FromSeconds(30)
          if ($timedOut) {
            $stdout = if ($stdoutTask.Wait($outputCollectionTimeout)) {
              $stdoutTask.GetAwaiter().GetResult()
            } else {
              "Timed out waiting for stdout after terminating dotnet process."
            }
            $stderr = if ($stderrTask.Wait($outputCollectionTimeout)) {
              $stderrTask.GetAwaiter().GetResult()
            } else {
              "Timed out waiting for stderr after terminating dotnet process."
            }
          } else {
            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
          }

          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "TestResults/test.stdout.log"),
            $stdout
          )
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "TestResults/test.stderr.log"),
            $stderr
          )
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "TestResults/test.log"),
            ($stdout + [Environment]::NewLine + $stderr)
          )

          if ($stdout) {
            [Console]::Out.WriteLine($stdout)
          }
          if ($stderr) {
            [Console]::Error.WriteLine($stderr)
          }

          if ($timedOut) {
            exit 124
          }

          exit $process.ExitCode

      - name: Write validation summary
        if: always()
        shell: pwsh
        run: |
          @"
          ## Factory Windows validation

          - Request: ``$env:FACTORY_REQUEST_ID``
          - Requested ref: ``$env:FACTORY_TARGET_REF``
          - Configuration: ``$env:FACTORY_CONFIGURATION``
          - Test filter: ``$env:FACTORY_TEST_FILTER``
          - Job status: ``${{ job.status }}``
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: factory-windows-${{ inputs.request_id }}
          path: TestResults/
          if-no-files-found: warn
          retention-days: 14
